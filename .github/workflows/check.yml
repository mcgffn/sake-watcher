name: Check sake09 stock

on:
  schedule:
    # 매시 17분 (정각 회피 + script 내부 5분 jitter와 결합).
    # GitHub Actions cron은 부하 시 지연될 수 있어 효과적 간격은 55~70분.
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (이메일 발송 및 state.json 저장 생략)'
        type: boolean
        default: false

# 동시 실행 방지: 지연된 cron이 다음 스케줄과 겹쳐 state.json push 경합이 생기는 케이스 차단
concurrency:
  group: check-sake09
  cancel-in-progress: false

permissions:
  contents: write  # state.json commit-back 위해 필수

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock check
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          # 선택: friendly name. 미설정 시 "sake-watcher" 기본값.
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "${DRY_RUN:-false}" = "true" ]; then
            python -m src.check --dry-run
          else
            python -m src.check
          fi

      - name: Commit and push state.json
        if: ${{ inputs.dry_run != true }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # state.json이 새 파일일 수도 있으므로 add 먼저 → cached diff로 검사
          git add state.json
          if git diff --cached --quiet state.json; then
            echo "[commit] state.json unchanged, skipping"
            exit 0
          fi

          git commit -m "chore(state): scheduled check $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Push retry: watchlist 수동 편집과의 경합 대비
          for i in 1 2 3; do
            if git push; then
              echo "[push] succeeded on attempt $i"
              exit 0
            fi
            echo "[push] attempt $i failed, pulling rebase and retrying"
            git pull --rebase
            sleep 2
          done

          echo "[push] failed after 3 retries"
          exit 1
